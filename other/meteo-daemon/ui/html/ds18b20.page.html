{{ define "ds18b20" }}
{{ template "header" }}
{{ template "menu" }}
<script async src="static/js/menu.js"></script>
<script async src="static/js/ds18b20.js"></script>
<script src="static/assets/Chart.js-2.9.3/Chart.min.js"></script>
</head>
<div>
    <h2>DS18B20</h2>
    <table class="table-canvas"><tr><td>
        <div id="ds18b20-cancas">
            <canvas id="ds18b20-chart" style="width:100%;max-width:1000px;"></canvas>
        </div>
    </td></tr></table>
    <div  class="buttons">
        <select class="cb-chart" id="period-ds18b20-chart" onchange="getData(currentDateTime)">
            <option selected value="day">Сутки</option>
            <option value="week">Неделя</option>
            <option value="month">Месяц</option>
            <option value="year">Год</option>
        </select>  
        <input class="btn chart-btn" id="ds18b20-chart-ptev" type="button" onclick="onDS18B20ChartPrev()" value="<<"/>    
        <input class="btn chart-btn" id="ds18b20-chart-next" type="button" onclick="onDS18B20ChartNext()" value=">>"/>    
    </div>
</div>
<div class="modalwin" id="popup-wait">
    <div class="modalwin-content">
        <div class="spinner"><div class="double-bounce1"></div>
        <div class="double-bounce2"></div>
    </div>
</div>           
{{ template "footer" }}
{{ end }}
